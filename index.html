<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Saturday?</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@600;800&display=swap");

    :root {
      --pink-50: #fff4fa;
      --pink-100: #ffe3f1;
      --pink-200: #ffc3dd;
      --hot-pink: #ff3f9f;
      --deep-pink: #c91d72;
      --berry: #7f164c;
      --cream: #fffaf0;
      --shadow: rgba(201, 29, 114, 0.22);
      --yes-scale: 1;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow-x: hidden;
      color: var(--berry);
      font-family: "Cairo", "Inter", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 116, 178, 0.28), transparent 28rem),
        radial-gradient(circle at bottom right, rgba(255, 212, 232, 0.72), transparent 30rem),
        linear-gradient(135deg, var(--pink-50), var(--pink-100) 45%, #ffd7eb);
    }

    body::before,
    body::after {
      position: fixed;
      z-index: 0;
      pointer-events: none;
      color: rgba(255, 63, 159, 0.16);
      font-size: clamp(6rem, 14vw, 14rem);
      line-height: 1;
      content: "♥";
      filter: drop-shadow(0 18px 22px rgba(201, 29, 114, 0.12));
    }

    body::before {
      top: 6vh;
      left: 5vw;
      transform: rotate(-18deg);
    }

    body::after {
      right: 6vw;
      bottom: 4vh;
      transform: rotate(16deg);
    }

    .page {
      position: relative;
      z-index: 1;
      display: grid;
      min-height: 100svh;
      padding: clamp(1rem, 4vw, 3rem);
      place-items: center;
    }

    .proposal {
      display: grid;
      width: min(100%, 46rem);
      min-height: min(44rem, calc(100svh - 2rem));
      align-content: center;
      justify-items: center;
      gap: clamp(1.3rem, 4vw, 2.4rem);
      padding: clamp(1.4rem, 5vw, 3rem);
      text-align: center;
    }

    .date-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 0.9rem;
      border: 1px solid rgba(255, 63, 159, 0.24);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 10px 24px rgba(201, 29, 114, 0.1);
      color: var(--deep-pink);
      font-family: "Inter", "Cairo", sans-serif;
      font-size: clamp(0.78rem, 2.2vw, 0.95rem);
      font-weight: 800;
      letter-spacing: 0;
      direction: ltr;
    }

    h1 {
      width: min(100%, 42rem);
      min-height: clamp(8.5rem, 23vw, 12rem);
      margin: 0;
      color: var(--berry);
      font-size: clamp(2rem, 6.5vw, 4.5rem);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 1.18;
      text-wrap: balance;
      text-shadow: 0 6px 0 rgba(255, 255, 255, 0.55);
      transition: color 180ms ease, transform 180ms ease;
    }

    .button-row {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: clamp(0.8rem, 4vw, 1.35rem);
      width: min(100%, 32rem);
      min-height: 5.5rem;
      direction: ltr;
    }

    button {
      min-width: clamp(7.4rem, 28vw, 10.5rem);
      min-height: 3.7rem;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-family: "Inter", "Cairo", sans-serif;
      font-size: clamp(1.1rem, 4vw, 1.35rem);
      font-weight: 800;
      letter-spacing: 0;
      touch-action: manipulation;
      transition:
        transform 180ms ease,
        opacity 280ms ease,
        background 180ms ease,
        box-shadow 180ms ease,
        filter 180ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible {
      outline: 4px solid rgba(127, 22, 76, 0.28);
      outline-offset: 4px;
    }

    #yesButton {
      position: relative;
      z-index: 3;
      color: white;
      background: linear-gradient(135deg, var(--hot-pink), #ff77bc);
      box-shadow: 0 18px 34px var(--shadow), inset 0 -4px 0 rgba(127, 22, 76, 0.18);
      transform: scale(var(--yes-scale));
    }

    #yesButton:hover {
      filter: saturate(1.18) brightness(1.04);
    }

    #noButton {
      z-index: 4;
      color: var(--deep-pink);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 14px 30px rgba(127, 22, 76, 0.13), inset 0 -3px 0 rgba(255, 63, 159, 0.14);
    }

    #noButton.is-running {
      position: fixed;
      margin: 0;
      will-change: top, left, transform, opacity;
      transition: top 300ms ease, left 300ms ease, opacity 280ms ease, transform 180ms ease;
    }

    #noButton.is-vanishing {
      pointer-events: none;
      opacity: 0;
      transform: scale(0.08) rotate(24deg);
    }

    .sparkles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .sparkles span {
      position: absolute;
      width: clamp(0.55rem, 1vw, 0.9rem);
      aspect-ratio: 1;
      border-radius: 999px;
      background: rgba(255, 63, 159, 0.34);
      animation: floaty var(--speed, 8s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      left: var(--x);
      top: var(--y);
    }

    .particle-layer {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      top: -3rem;
      left: var(--left);
      width: var(--size);
      height: var(--size);
      color: var(--color);
      opacity: 0;
      transform: translate3d(0, -4rem, 0) rotate(0deg);
      animation: fall var(--duration) linear forwards;
      animation-delay: var(--delay);
    }

    .particle.heart {
      width: auto;
      height: auto;
      font-size: var(--size);
      line-height: 1;
    }

    .particle.confetti {
      border-radius: 0.16rem;
      background: var(--color);
    }

    body.celebrating h1 {
      color: var(--deep-pink);
      transform: scale(1.03);
    }

    @keyframes floaty {
      0%,
      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(0.7rem, -1rem, 0) scale(1.25);
      }
    }

    @keyframes fall {
      0% {
        opacity: 0;
        transform: translate3d(0, -4rem, 0) rotate(0deg);
      }

      8% {
        opacity: 1;
      }

      100% {
        opacity: 0.96;
        transform: translate3d(var(--drift), calc(100svh + 7rem), 0) rotate(var(--spin));
      }
    }

    @media (max-width: 34rem) {
      .proposal {
        min-height: calc(100svh - 1rem);
      }

      .button-row {
        gap: 0.8rem;
      }

      button {
        min-width: min(42vw, 9rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="sparkles" aria-hidden="true">
    <span style="--x: 12%; --y: 18%; --speed: 7s; --delay: -1s;"></span>
    <span style="--x: 84%; --y: 14%; --speed: 9s; --delay: -3s;"></span>
    <span style="--x: 20%; --y: 76%; --speed: 8s; --delay: -4s;"></span>
    <span style="--x: 72%; --y: 80%; --speed: 10s; --delay: -2s;"></span>
    <span style="--x: 45%; --y: 10%; --speed: 8.5s; --delay: -5s;"></span>
  </div>

  <main class="page">
    <section class="proposal" aria-labelledby="question">
      <h1 id="question" dir="rtl">طليقتي العزيزة,  السبت بالليل انجزي</h1>
      <div class="button-row">
        <button id="yesButton" type="button" lang="en" dir="ltr">Yes</button>
        <button id="noButton" type="button" lang="en" dir="ltr">No</button>
      </div>
    </section>
  </main>

  <div id="particleLayer" class="particle-layer" aria-hidden="true"></div>

  <script>
    const question = document.getElementById("question");
    const yesButton = document.getElementById("yesButton");
    const noButton = document.getElementById("noButton");
    const particleLayer = document.getElementById("particleLayer");

    const catchPhrases = [
      "بجد  لا 😢",
       "اتلمي يا يمني ",
      "فكري تاني طاه 🥺",
      "لا احا بقي",
      "يا بنت الحلال عيب كدا ",
      "ما قولنا ظبطت مع الارصاد الجوية الله ", 
      "ادي اممممم الزرار "
    ];

    let catchCount = 0;
    let teleportLocked = false;
    let noButtonGone = false;

    function setYesEnergy() {
      const scale = Math.min(1.5, 1 + catchCount * 0.09);
      document.documentElement.style.setProperty("--yes-scale", scale.toFixed(2));
      yesButton.style.background = `linear-gradient(135deg, hsl(${326 + catchCount * 3} 100% ${56 - catchCount}%), hsl(336 100% ${73 - catchCount * 2}%))`;
      yesButton.style.boxShadow = `0 ${18 + catchCount * 3}px ${34 + catchCount * 5}px rgba(201, 29, 114, ${0.22 + catchCount * 0.035}), inset 0 -4px 0 rgba(127, 22, 76, 0.2)`;
    }

    function moveNoButton() {
      if (noButtonGone || teleportLocked) {
        return;
      }

      teleportLocked = true;
      const rect = noButton.getBoundingClientRect();
      const margin = 12;
      const maxLeft = Math.max(margin, window.innerWidth - rect.width - margin);
      const maxTop = Math.max(margin, window.innerHeight - rect.height - margin);
      const nextLeft = Math.floor(margin + Math.random() * Math.max(1, maxLeft - margin));
      const nextTop = Math.floor(margin + Math.random() * Math.max(1, maxTop - margin));

      noButton.classList.add("is-running");
      noButton.style.left = `${nextLeft}px`;
      noButton.style.top = `${nextTop}px`;

      if (catchCount < catchPhrases.length) {
        question.textContent = catchPhrases[catchCount];
      }

      catchCount += 1;
      setYesEnergy();

      if (catchCount >= catchPhrases.length) {
        noButtonGone = true;

        const angryImg = document.createElement("img");
        angryImg.src = "IMG_1135.PNG";
        angryImg.style.width = "min(100%, 250px)";
        angryImg.style.borderRadius = "16px";
        angryImg.style.boxShadow = "0 10px 24px rgba(201, 29, 114, 0.2)";
        angryImg.style.marginTop = "-1rem";
        angryImg.style.opacity = "0";
        angryImg.style.transition = "opacity 0.6s ease";
        question.after(angryImg);
        setTimeout(() => { angryImg.style.opacity = "1"; }, 50);

        window.setTimeout(() => {
          noButton.classList.add("is-vanishing");
        }, 120);
        window.setTimeout(() => {
          noButton.style.display = "none";
        }, 520);
        return;
      }

      window.setTimeout(() => {
        teleportLocked = false;
      }, 130);
    }

    function isPointerNearNoButton(event) {
      if (noButtonGone) {
        return false;
      }

      const rect = noButton.getBoundingClientRect();
      const buffer = Math.max(54, Math.min(window.innerWidth, window.innerHeight) * 0.12);
      return (
        event.clientX >= rect.left - buffer &&
        event.clientX <= rect.right + buffer &&
        event.clientY >= rect.top - buffer &&
        event.clientY <= rect.bottom + buffer
      );
    }

    function handlePointerNear(event) {
      if (isPointerNearNoButton(event)) {
        moveNoButton();
      }
    }

    function celebrate() {
      document.body.classList.add("celebrating");
      question.textContent = "😍 كان لازم اجيب الفاكنج يعني, مستنيكي مزتي";
      noButtonGone = true;
      noButton.style.display = "none";
      document.documentElement.style.setProperty("--yes-scale", "1.35");

      const bottomMsg = document.createElement("div");
      bottomMsg.textContent = "انا بجد محتاج اشوفك";
      bottomMsg.style.position = "fixed";
      bottomMsg.style.bottom = "2rem";
      bottomMsg.style.right = "2rem";
      bottomMsg.style.color = "var(--deep-pink)";
      bottomMsg.style.fontFamily = "'Cairo', sans-serif";
      bottomMsg.style.fontSize = "clamp(1.2rem, 4vw, 1.6rem)";
      bottomMsg.style.fontWeight = "bold";
      bottomMsg.style.zIndex = "100";
      bottomMsg.style.opacity = "0";
      bottomMsg.style.transition = "opacity 1s ease";
      bottomMsg.style.textShadow = "0 2px 4px rgba(255, 255, 255, 0.8)";
      document.body.appendChild(bottomMsg);
      setTimeout(() => { bottomMsg.style.opacity = "1"; }, 100);

      particleLayer.textContent = "";
      const colors = ["#ff3f9f", "#ff8ec7", "#ffd166", "#ffffff", "#b5179e", "#ff5c8a"];
      const particleCount = window.innerWidth < 560 ? 76 : 130;

      for (let index = 0; index < particleCount; index += 1) {
        const particle = document.createElement("span");
        const isHeart = Math.random() > 0.46;
        particle.className = `particle ${isHeart ? "heart" : "confetti"}`;
        particle.style.setProperty("--left", `${Math.random() * 100}%`);
        particle.style.setProperty("--size", `${Math.random() * 1.1 + 0.65}rem`);
        particle.style.setProperty("--color", colors[Math.floor(Math.random() * colors.length)]);
        particle.style.setProperty("--duration", `${Math.random() * 2.6 + 3.3}s`);
        particle.style.setProperty("--delay", `${Math.random() * 0.9}s`);
        particle.style.setProperty("--drift", `${(Math.random() - 0.5) * 13}rem`);
        particle.style.setProperty("--spin", `${(Math.random() - 0.5) * 720}deg`);

        if (isHeart) {
          particle.textContent = Math.random() > 0.55 ? "♥" : "💕";
        }

        particleLayer.appendChild(particle);
      }
    }

    noButton.addEventListener("click", (event) => {
      event.preventDefault();
      moveNoButton();
    });

    yesButton.addEventListener("click", celebrate);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Saturday?</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@600;800&display=swap");

    :root {
      --pink-50: #fff4fa;
      --pink-100: #ffe3f1;
      --pink-200: #ffc3dd;
      --hot-pink: #ff3f9f;
      --deep-pink: #c91d72;
      --berry: #7f164c;
      --cream: #fffaf0;
      --shadow: rgba(201, 29, 114, 0.22);
      --yes-scale: 1;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    html {
      height: -webkit-fill-available;
    }

    body {
      overflow-x: hidden;
      min-height: -webkit-fill-available;
      color: var(--berry);
      font-family: "Cairo", "Inter", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 116, 178, 0.28), transparent 28rem),
        radial-gradient(circle at bottom right, rgba(255, 212, 232, 0.72), transparent 30rem),
        linear-gradient(135deg, var(--pink-50), var(--pink-100) 45%, #ffd7eb);
    }

    body::before,
    body::after {
      position: fixed;
      z-index: 0;
      pointer-events: none;
      color: rgba(255, 63, 159, 0.16);
      font-size: clamp(6rem, 14vw, 14rem);
      line-height: 1;
      content: "♥";
      filter: drop-shadow(0 18px 22px rgba(201, 29, 114, 0.12));
    }

    body::before {
      top: 6vh;
      left: 5vw;
      transform: rotate(-18deg);
    }

    body::after {
      right: 6vw;
      bottom: 4vh;
      transform: rotate(16deg);
    }

    .page {
      position: relative;
      z-index: 1;
      display: grid;
      width: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      min-height: 100dvh;
      min-height: 100svh;
      padding:
        max(clamp(1rem, 4vw, 3rem), env(safe-area-inset-top))
        max(clamp(1rem, 4vw, 3rem), env(safe-area-inset-right))
        max(clamp(1rem, 4vw, 3rem), env(safe-area-inset-bottom))
        max(clamp(1rem, 4vw, 3rem), env(safe-area-inset-left));
      place-items: center;
    }

    .proposal {
      display: grid;
      width: min(100%, 46rem);
      min-height: min(44rem, calc(100svh - 2rem));
      align-content: center;
      justify-items: center;
      gap: clamp(0.9rem, 3.2vw, 1.65rem);
      padding: clamp(1rem, 4vw, 2.5rem);
      text-align: center;
    }

    .date-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 0.9rem;
      border: 1px solid rgba(255, 63, 159, 0.24);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 10px 24px rgba(201, 29, 114, 0.1);
      color: var(--deep-pink);
      font-family: "Inter", "Cairo", sans-serif;
      font-size: clamp(0.78rem, 2.2vw, 0.95rem);
      font-weight: 800;
      letter-spacing: 0;
      direction: ltr;
    }

    h1 {
      width: min(100%, 42rem);
      min-height: clamp(5.8rem, 16vw, 8.4rem);
      margin: 0;
      color: var(--berry);
      font-size: clamp(2rem, 6vw, 4.15rem);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 1.22;
      text-wrap: balance;
      text-shadow: 0 6px 0 rgba(255, 255, 255, 0.55);
      transition: color 180ms ease, transform 180ms ease;
    }

    .meme-stage {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(0.55rem, 2vw, 0.9rem);
      width: min(100%, 36rem);
      direction: rtl;
    }

    .meme-card {
      position: relative;
      display: grid;
      min-height: 5.4rem;
      align-content: center;
      gap: 0.25rem;
      padding: 0.72rem 0.66rem;
      border: 2px solid rgba(201, 29, 114, 0.18);
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.66);
      box-shadow: 0 14px 26px rgba(127, 22, 76, 0.1), inset 0 -5px 0 rgba(255, 63, 159, 0.08);
      transform: rotate(var(--tilt));
      transition: transform 220ms ease, background 220ms ease, border-color 220ms ease, box-shadow 220ms ease;
    }

    .meme-card::before {
      position: absolute;
      top: -0.52rem;
      inset-inline-start: 0.72rem;
      width: 2.2rem;
      height: 1rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 6px 12px rgba(127, 22, 76, 0.08);
      content: "";
      transform: rotate(-6deg);
    }

    .meme-tag {
      color: var(--deep-pink);
      font-family: "Inter", "Cairo", sans-serif;
      font-size: clamp(0.68rem, 2vw, 0.78rem);
      font-weight: 800;
      letter-spacing: 0;
      direction: ltr;
      text-transform: uppercase;
    }

    .meme-copy {
      margin: 0;
      color: var(--berry);
      font-size: clamp(0.86rem, 2.45vw, 1rem);
      font-weight: 800;
      line-height: 1.35;
      text-wrap: balance;
    }

    .meme-card.is-active {
      z-index: 2;
      border-color: rgba(255, 63, 159, 0.46);
      background: rgba(255, 246, 251, 0.94);
      box-shadow: 0 18px 34px rgba(201, 29, 114, 0.2), inset 0 -5px 0 rgba(255, 63, 159, 0.13);
      transform: translateY(-0.28rem) rotate(0deg) scale(1.04);
    }

    .begging-line {
      min-height: 2.1rem;
      margin: 0;
      padding: 0 0.35rem;
      color: var(--deep-pink);
      font-size: clamp(1rem, 3.2vw, 1.28rem);
      font-weight: 900;
      line-height: 1.45;
      text-wrap: balance;
    }

    .button-row {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: clamp(0.8rem, 4vw, 1.35rem);
      width: min(100%, 32rem);
      min-height: 5.5rem;
      direction: ltr;
    }

    button {
      min-width: clamp(7.4rem, 28vw, 10.5rem);
      min-height: 3.7rem;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-family: "Inter", "Cairo", sans-serif;
      font-size: clamp(1.1rem, 4vw, 1.35rem);
      font-weight: 800;
      letter-spacing: 0;
      touch-action: manipulation;
      transition:
        transform 180ms ease,
        opacity 280ms ease,
        background 180ms ease,
        box-shadow 180ms ease,
        filter 180ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      filter: brightness(0.98) saturate(1.08);
    }

    button:focus-visible {
      outline: 4px solid rgba(127, 22, 76, 0.28);
      outline-offset: 4px;
    }

    #yesButton {
      position: relative;
      z-index: 3;
      color: white;
      background: linear-gradient(135deg, var(--hot-pink), #ff77bc);
      box-shadow: 0 18px 34px var(--shadow), inset 0 -4px 0 rgba(127, 22, 76, 0.18);
      transform: scale(var(--yes-scale));
    }

    #yesButton:hover {
      filter: saturate(1.18) brightness(1.04);
    }

    #yesButton:active {
      transform: scale(calc(var(--yes-scale) * 0.96));
    }

    #noButton {
      z-index: 4;
      color: var(--deep-pink);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 14px 30px rgba(127, 22, 76, 0.13), inset 0 -3px 0 rgba(255, 63, 159, 0.14);
    }

    #noButton.is-running {
      position: fixed;
      margin: 0;
      will-change: top, left, transform, opacity;
      transition:
        top 160ms cubic-bezier(0.2, 0.8, 0.2, 1),
        left 160ms cubic-bezier(0.2, 0.8, 0.2, 1),
        transform 180ms ease,
        opacity 280ms ease,
        background 180ms ease,
        box-shadow 180ms ease,
        filter 180ms ease;
    }

    #noButton.is-vanishing {
      pointer-events: none;
      opacity: 0;
      transform: scale(0.08) rotate(24deg);
    }

    .sparkles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .sparkles span {
      position: absolute;
      width: clamp(0.55rem, 1vw, 0.9rem);
      aspect-ratio: 1;
      border-radius: 999px;
      background: rgba(255, 63, 159, 0.34);
      animation: floaty var(--speed, 8s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      left: var(--x);
      top: var(--y);
    }

    .particle-layer {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      top: -3rem;
      left: var(--left);
      width: var(--size);
      height: var(--size);
      color: var(--color);
      opacity: 0;
      transform: translate3d(0, -4rem, 0) rotate(0deg);
      animation: fall var(--duration) linear forwards;
      animation-delay: var(--delay);
    }

    .particle.heart {
      width: auto;
      height: auto;
      font-size: var(--size);
      line-height: 1;
    }

    .particle.confetti {
      border-radius: 0.16rem;
      background: var(--color);
    }

    body.celebrating h1 {
      color: var(--deep-pink);
      transform: scale(1.03);
    }

    @keyframes floaty {
      0%,
      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(0.7rem, -1rem, 0) scale(1.25);
      }
    }

    @keyframes fall {
      0% {
        opacity: 0;
        transform: translate3d(0, -4rem, 0) rotate(0deg);
      }

      8% {
        opacity: 1;
      }

      100% {
        opacity: 0.96;
        transform: translate3d(var(--drift), calc(100svh + 7rem), 0) rotate(var(--spin));
      }
    }

    @media (max-width: 34rem) {
      body::before,
      body::after {
        font-size: 5.5rem;
      }

      .proposal {
        min-height: calc(100vh - 1rem);
        min-height: -webkit-fill-available;
        min-height: calc(100dvh - 1rem);
        min-height: calc(100svh - 1rem);
        gap: 0.85rem;
      }

      h1 {
        min-height: 4.8rem;
        font-size: max(1.55rem, 7vw);
        line-height: 1.24;
      }

      .date-pill {
        padding: 0.42rem 0.78rem;
      }

      .meme-stage {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.58rem;
      }

      .meme-card {
        min-height: 4.65rem;
        padding: 0.62rem 0.55rem;
        border-radius: 0.82rem;
      }

      .meme-card:nth-child(3) {
        grid-column: 1 / -1;
        min-height: 4.15rem;
      }

      .meme-copy {
        font-size: 0.86rem;
      }

      .begging-line {
        min-height: 1.8rem;
        font-size: 0.98rem;
      }

      .button-row {
        gap: 0.8rem;
        min-height: 4.8rem;
      }

      button {
        min-width: min(42vw, 9rem);
        min-height: 3.35rem;
      }
    }

    @supports (-webkit-touch-callout: none) {
      .page {
        min-height: -webkit-fill-available;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="sparkles" aria-hidden="true">
    <span style="--x: 12%; --y: 18%; --speed: 7s; --delay: -1s;"></span>
    <span style="--x: 84%; --y: 14%; --speed: 9s; --delay: -3s;"></span>
    <span style="--x: 20%; --y: 76%; --speed: 8s; --delay: -4s;"></span>
    <span style="--x: 72%; --y: 80%; --speed: 10s; --delay: -2s;"></span>
    <span style="--x: 45%; --y: 10%; --speed: 8.5s; --delay: -5s;"></span>
  </div>

  <main class="page">
    <section class="proposal" aria-labelledby="question">
      <div class="date-pill" aria-label="Saturday night">Saturday night ♥</div>
      <h1 id="question" dir="rtl" aria-live="polite">طليقتي العزيزة  السبت بالليل انجزي</h1>

        </article>
        <article class="meme-card" style="--tilt: 2deg;">
          <span class="meme-tag">Forecast</span>

        </article>
        <article class="meme-card" style="--tilt: -1.2deg;">
          <span class="meme-tag">Last try</span>
          <p class="meme-copy">طب والنبي فكري فيها</p>
        </article>
      </div>

  <p id="sweetMsg" dir="rtl" style="display:none; position:fixed; bottom:max(1.2rem, env(safe-area-inset-bottom)); right:max(1.2rem, env(safe-area-inset-right)); z-index:10; color:#c91d72; font-family:Cairo,sans-serif; font-size:clamp(0.95rem,3.5vw,1.2rem); font-weight:700; text-shadow:0 2px 8px rgba(255,255,255,0.7); opacity:0; transition:opacity 800ms ease;">&#x0627;&#x0646;&#x0627; &#x0628;&#x062C;&#x062F; &#x0645;&#x062D;&#x062A;&#x0627;&#x062C; &#x0627;&#x0634;&#x0648;&#x0641;&#x0643; 💕</p>
  <div id="particleLayer" class="particle-layer" aria-hidden="true"></div>

  <script>
    const question = document.getElementById("question");
    const yesButton = document.getElementById("yesButton");
    const noButton = document.getElementById("noButton");
    const particleLayer = document.getElementById("particleLayer");
    const beggingLine = document.getElementById("beggingLine");
    const memeCards = [...document.querySelectorAll(".meme-card")];

    const catchPhrases = [
      "فعلا  لا 😢",
      "فكري تاني طاه 🥺",
      "يا بنت الحلال عيب كدا ",
      "ما قولنا ظبطنا مع الارصاد الجوية خلاص الله ",
      "خلاص ام الزرار ده هيتلغي حالا. "
    ];

    const beggingLines = [
      "أنا كدا دخلت مرحلة التوسل الرسمي",
      "حتى الارصاد قالت Saturday مناسب",
      "لا دي كلمة كبيرة على قلب صغير",
      "آخر محاولة محترمة قبل الدراما",
      "تمام كدا مفيش زرار No من أصله"
    ];

    let catchCount = 0;
    let teleportLocked = false;
    let noButtonGone = false;
    const canUseHover = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

    function setYesEnergy() {
      const scale = Math.min(1.5, 1 + catchCount * 0.09);
      document.documentElement.style.setProperty("--yes-scale", scale.toFixed(2));
      yesButton.style.background = `linear-gradient(135deg, hsl(${326 + catchCount * 3} 100% ${56 - catchCount}%), hsl(336 100% ${73 - catchCount * 2}%))`;
      yesButton.style.boxShadow = `0 ${18 + catchCount * 3}px ${34 + catchCount * 5}px rgba(201, 29, 114, ${0.22 + catchCount * 0.035}), inset 0 -4px 0 rgba(127, 22, 76, 0.2)`;
    }

    function activateMeme(index) {
      memeCards.forEach((card, cardIndex) => {
        card.classList.toggle("is-active", cardIndex === index % memeCards.length);
      });

      if (beggingLine && beggingLines[index]) {
        beggingLine.textContent = beggingLines[index];
      }
    }

    function moveNoButton() {
      if (noButtonGone || teleportLocked) {
        return;
      }

      teleportLocked = true;
      const rect = noButton.getBoundingClientRect();
      const viewport = window.visualViewport;
      const viewportLeft = viewport ? viewport.offsetLeft : 0;
      const viewportTop = viewport ? viewport.offsetTop : 0;
      const viewportWidth = viewport ? viewport.width : window.innerWidth;
      const viewportHeight = viewport ? viewport.height : window.innerHeight;
      const marginX = 16;
      const marginTop = 18;
      const marginBottom = 34;
      const availableWidth = Math.max(1, viewportWidth - rect.width - marginX * 2);
      const availableHeight = Math.max(1, viewportHeight - rect.height - marginTop - marginBottom);
      const nextLeft = Math.floor(viewportLeft + marginX + Math.random() * availableWidth);
      const nextTop = Math.floor(viewportTop + marginTop + Math.random() * availableHeight);

      noButton.classList.add("is-running");
      noButton.style.left = `${nextLeft}px`;
      noButton.style.top = `${nextTop}px`;

      if (catchCount < catchPhrases.length) {
        question.textContent = catchPhrases[catchCount];
        activateMeme(catchCount);
      }

      catchCount += 1;
      setYesEnergy();

      if (catchCount >= catchPhrases.length) {
        noButtonGone = true;
        document.getElementById('noButtonImg').style.display = 'block';
        window.setTimeout(() => {
          noButton.classList.add("is-vanishing");
        }, 120);
        window.setTimeout(() => {
          noButton.style.display = "none";
        }, 520);
        return;
      }

      window.setTimeout(() => {
        teleportLocked = false;
      }, 130);
    }

    function isPointerNearNoButton(event) {
      if (noButtonGone) {
        return false;
      }

      const rect = noButton.getBoundingClientRect();
      const buffer = Math.max(54, Math.min(window.innerWidth, window.innerHeight) * 0.12);
      return (
        event.clientX >= rect.left - buffer &&
        event.clientX <= rect.right + buffer &&
        event.clientY >= rect.top - buffer &&
        event.clientY <= rect.bottom + buffer
      );
    }

    function handlePointerNear(event) {
      if (isPointerNearNoButton(event)) {
        moveNoButton();
      }
    }

    function celebrate() {
      document.body.classList.add("celebrating");
      question.textContent = "ايه دا بالسرعة دي مستنيكي مزتي";
      noButtonGone = true;
      noButton.style.display = "none";
      const sweetEl = document.getElementById("sweetMsg");
      if (sweetEl) {
        sweetEl.style.display = "block";
        setTimeout(() => { sweetEl.style.opacity = "1"; }, 100);
      }
      document.documentElement.style.setProperty("--yes-scale", "1.35");

      particleLayer.textContent = "";
      const colors = ["#ff3f9f", "#ff8ec7", "#ffd166", "#ffffff", "#b5179e", "#ff5c8a"];
      const particleCount = window.innerWidth < 560 ? 76 : 130;

      for (let index = 0; index < particleCount; index += 1) {
        const particle = document.createElement("span");
        const isHeart = Math.random() > 0.46;
        particle.className = `particle ${isHeart ? "heart" : "confetti"}`;
        particle.style.setProperty("--left", `${Math.random() * 100}%`);
        particle.style.setProperty("--size", `${Math.random() * 1.1 + 0.65}rem`);
        particle.style.setProperty("--color", colors[Math.floor(Math.random() * colors.length)]);
        particle.style.setProperty("--duration", `${Math.random() * 2.6 + 3.3}s`);
        particle.style.setProperty("--delay", `${Math.random() * 0.9}s`);
        particle.style.setProperty("--drift", `${(Math.random() - 0.5) * 13}rem`);
        particle.style.setProperty("--spin", `${(Math.random() - 0.5) * 720}deg`);

        if (isHeart) {
          particle.textContent = Math.random() > 0.55 ? "♥" : "💕";
        }

        particleLayer.appendChild(particle);
      }
    }

    if (canUseHover) {
      noButton.addEventListener("pointerenter", moveNoButton);
      document.addEventListener("pointermove", handlePointerNear, { passive: true });
    }

    noButton.addEventListener("pointerdown", (event) => {
      if (!canUseHover) {
        event.preventDefault();
        moveNoButton();
      }
    });

    noButton.addEventListener("click", (event) => {
      event.preventDefault();
      moveNoButton();
    });

    document.addEventListener("pointerdown", (event) => {
      if (!canUseHover && event.target !== yesButton) {
        handlePointerNear(event);
      }
    }, { passive: true });

    yesButton.addEventListener("click", celebrate);
  </script>
</body>
</html>
